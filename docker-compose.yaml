version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: quiz_service
    volumes:
      - mongodb_data:/data/db
    networks:
      - seika-network

volumes:
  mongodb_data:

networks:
  seika-network:
    driver: bridge