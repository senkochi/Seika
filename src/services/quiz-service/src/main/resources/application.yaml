spring:
  config:
    import: "configserver:"
  application:
    name: quiz_service
  profiles:
    active: ${SPRING_PROFILE:dev}
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL}
      fail-fast: false
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 6

# MongoDB, eureka, and logging are defined in Config Server
# See /config-service/src/main/resources/configs/quiz_service.yaml

