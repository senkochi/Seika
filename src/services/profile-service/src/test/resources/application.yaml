spring:
  cloud:
    config:
      enabled: false
  config:
    import: "optional:configserver:http://localhost:8888"
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  rabbitmq:
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

jwt:
  issuer: seika-identity-service-test
  secret: testsecretkeymustbeatleast32byteslongforjwtvalidationhmacsha256
  access-token-expiration-minutes: 60
  refresh-token-expiration-days: 7

eureka:
  client:
    enabled: false
