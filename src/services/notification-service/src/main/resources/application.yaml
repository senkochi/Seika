spring:
  config:
    import: "configserver:"
  application:
    name: notification-service
  mongodb:
    uri: ${NOTIFICATION_MONGO_URI}
    database: ${NOTIFICATION_MONGO_DATABASE:seika_notification}
  profiles:
    active: ${SPRING_PROFILE:dev}
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://localhost:8888}
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 6
