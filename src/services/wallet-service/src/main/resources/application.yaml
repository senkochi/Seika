spring:
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  application:
    name: wallet-service
  profiles:
    active: ${SPRING_PROFILE:dev}
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://localhost:8888}
      fail-fast: ${CONFIG_SERVER_FAIL_FAST:true}
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 6

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true
  api-docs:
    path: /v3/api-docs

# Các cấu hình datasource, jwt, eureka... được định nghĩa trong Config Server
# Xem /config-service/src/main/resources/configs/wallet-service.yaml
