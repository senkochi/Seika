spring:
  config:
    import: "configserver:"
  application:
    name: identity-service
  profiles:
    active: ${SPRING_PROFILE:dev}
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://localhost:8888}
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 6


# Các cấu hình datasource, Eureka... được định nghĩa trong Config Server
# Xem /config-service/src/main/resources/configs/identity-service.yaml
