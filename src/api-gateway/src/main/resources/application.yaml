spring:
  config:
    import: "configserver:"
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # API routes
            - id: identity-auth-route
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/api/auth/**
            - id: identity-route
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/identity/**
              filters:
                - StripPrefix=1
            - id: admin-route
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/api/admin/**,/api/admin
            - id: flashcard-service
              uri: lb://FLASHCARD-SERVICE
              predicates:
                - Path=/api/flashcards/**,/api/flashcards
            - id: profile-route
              uri: lb://PROFILE-SERVICE
              predicates:
                - Path=/api/profiles/**,/api/profiles
            - id: wallet-route
              uri: lb://WALLET-SERVICE
              predicates:
                - Path=/api/wallet/**,/api/wallet
            # OpenAPI aggregation routes
            - id: openapi-identity
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/v3/api-docs/identity-service
              filters:
                - RewritePath=/v3/api-docs/identity-service,/v3/api-docs
            - id: openapi-profile
              uri: lb://PROFILE-SERVICE
              predicates:
                - Path=/v3/api-docs/profile-service
              filters:
                - RewritePath=/v3/api-docs/profile-service,/v3/api-docs
            - id: openapi-wallet
              uri: lb://WALLET-SERVICE
              predicates:
                - Path=/v3/api-docs/wallet-service
              filters:
                - RewritePath=/v3/api-docs/wallet-service,/v3/api-docs
            - id: openapi-marketplace
              uri: lb://MARKETPLACE-SERVICE
              predicates:
                - Path=/v3/api-docs/marketplace-service
              filters:
                - RewritePath=/v3/api-docs/marketplace-service,/v3/api-docs
            - id: openapi-flashcard
              uri: lb://FLASHCARD-SERVICE
              predicates:
                - Path=/v3/api-docs/flashcard-service
              filters:
                - RewritePath=/v3/api-docs/flashcard-service,/v3/api-docs
            - id: openapi-quiz
              uri: lb://QUIZ-SERVICE
              predicates:
                - Path=/v3/api-docs/quiz-service
              filters:
                - RewritePath=/v3/api-docs/quiz-service,/v3/api-docs
            - id: openapi-notification
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/v3/api-docs/notification-service
              filters:
                - RewritePath=/v3/api-docs/notification-service,/v3/api-docs
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
          route-definition-locator:
            enabled: true
    config:
      uri: ${CONFIG_SERVER_URL}
      fail-fast: true
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 6

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true
    urls:
      - name: Identity Service
        url: /v3/api-docs/identity-service
      - name: Profile Service
        url: /v3/api-docs/profile-service
      - name: Wallet Service
        url: /v3/api-docs/wallet-service
      - name: Marketplace Service
        url: /v3/api-docs/marketplace-service
      - name: Flashcard Service
        url: /v3/api-docs/flashcard-service
      - name: Quiz Service
        url: /v3/api-docs/quiz-service
      - name: Notification Service
        url: /v3/api-docs/notification-service
  api-docs:
    path: /v3/api-docs

server:
  port: ${GATEWAY_PORT:8080}
