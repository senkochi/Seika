spring:
  config:
    import:
      - "optional:file:.env[.properties]"
      - "optional:file:../../.env[.properties]"
      - "optional:file:../../../.env[.properties]"
  profiles:
    active: native
  application:
    name: config-service
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs
        overrides:
          CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:http://localhost:8888}
          CONFIG_SERVER_PORT: ${CONFIG_SERVER_PORT:8888}
          EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
          EUREKA_PORT: ${EUREKA_PORT:8761}
          GATEWAY_PORT: ${GATEWAY_PORT:8080}
          PROFILE_SERVER_URL: ${PROFILE_SERVER_URL:http://localhost:8082}
          WALLET_SERVER_URL: ${WALLET_SERVER_URL:http://localhost:8083}
          IDENTITY_SERVER_URL: ${IDENTITY_SERVER_URL:http://localhost:8081}

          IDENTITY_DB_URL: ${IDENTITY_DB_URL}
          IDENTITY_DB_USERNAME: ${IDENTITY_DB_USERNAME}
          IDENTITY_DB_PASSWORD: ${IDENTITY_DB_PASSWORD}

          PROFILE_DB_URL: ${PROFILE_DB_URL}
          PROFILE_DB_USERNAME: ${PROFILE_DB_USERNAME}
          PROFILE_DB_PASSWORD: ${PROFILE_DB_PASSWORD}

          WALLET_DB_URL: ${WALLET_DB_URL}
          WALLET_DB_USERNAME: ${WALLET_DB_USERNAME}
          WALLET_DB_PASSWORD: ${WALLET_DB_PASSWORD}
          WALLET_DB_SCHEMA: ${WALLET_DB_SCHEMA}
        substitute-placeholders: true
        # git:
        #   uri: https://github.com/NguyenHungCuongg/Seika.git #Trở về repository chính của project
        #   default-label: master #Nhánh chính của repository
        #   search-paths: configs #Đường dẫn đến thư mục chứa file cấu hình trong repository

server:
  port: ${CONFIG_SERVER_PORT:8888}

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true