spring:
  config:
    import:
      - "optional:file:.env[.properties]"
      - "optional:file:../../.env[.properties]"
      - "optional:file:../../../.env[.properties]"
  profiles:
    active: native
  application:
    name: config-service
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs
        overrides:
          ADMIN_INITIAL_ENABLED: ${ADMIN_INITIAL_ENABLED:false}
          ADMIN_INITIAL_USERNAME: ${ADMIN_INITIAL_USERNAME:}
          ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:}

          EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
          JWT_SECRET: ${JWT_SECRET}
          JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
          JWT_REFRESH_TOKEN_EXPIRATION_DAYS: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS}
          PROFILE_SERVER_URL: ${PROFILE_SERVER_URL}

          IDENTITY_DB_URL: ${IDENTITY_DB_URL}
          IDENTITY_DB_USERNAME: ${IDENTITY_DB_USERNAME}
          IDENTITY_DB_PASSWORD: ${IDENTITY_DB_PASSWORD}

          PROFILE_DB_URL: ${PROFILE_DB_URL}
          PROFILE_DB_USERNAME: ${PROFILE_DB_USERNAME}
          PROFILE_DB_PASSWORD: ${PROFILE_DB_PASSWORD}

          NOTIFICATION_MONGO_URI: ${NOTIFICATION_MONGO_URI}
          NOTIFICATION_MONGO_DATABASE: ${NOTIFICATION_MONGO_DATABASE:seika_notification}
          NOTIFICATION_SERVER_PORT: ${NOTIFICATION_SERVER_PORT:8083}

          RABBITMQ_HOST: ${RABBITMQ_HOST}
          RABBITMQ_PORT: ${RABBITMQ_PORT}
          RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
          RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
          IDENTITY_EVENTS_EXCHANGE: ${IDENTITY_EVENTS_EXCHANGE:identity.events}
          USER_REGISTERED_ROUTING_KEY: ${USER_REGISTERED_ROUTING_KEY:user.registered}
        substitute-placeholders: true
        # git:
        #   uri: https://github.com/NguyenHungCuongg/Seika.git #Trở về repository chính của project
        #   default-label: master #Nhánh chính của repository
        #   search-paths: configs #Đường dẫn đến thư mục chứa file cấu hình trong repository

server:
  port: ${CONFIG_SERVER_PORT:8888}

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
