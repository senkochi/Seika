server:
  port: ${QUIZ_SERVER_PORT:8087}

spring:
  application:
    name: quiz-service
  data:
    mongodb:
      uri: ${QUIZ_DB_URI}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

jwt:
  issuer: seika-identity-service
  secret: ${JWT_SECRET}
  access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
  refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS}

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  metrics:
    tags:
      application: ${spring.application.name}
      namespace: default
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,trace"
  endpoint:
    health:
      show-details: always
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: "http://tempo:4318/v1/traces"
          transport: http
  tracing:
    enabled: true
    sampling:
      probability: 1.0
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
