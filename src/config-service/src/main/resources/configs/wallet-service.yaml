server:
  port: ${WALLET_SERVER_PORT:8084}

spring:
  application:
    name: wallet-service

  datasource:
    url: ${WALLET_DB_URL}
    username: ${WALLET_DB_USERNAME}
    password: ${WALLET_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: ${DB_CONNECTION_TIMEOUT:45000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT:5000}
      leak-detection-threshold: ${DB_LEAK_DETECTION:2000}

  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        default_schema: ${WALLET_DB_SCHEMA:wallet}
        format_sql: true
        temp:
          use_jdbc_metadata_defaults: false

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

logging:
  level:
    org.springframework.security: ${SECURITY_LOG_LEVEL:trace}
    org.springframework.jdbc: ${JDBC_LOG_LEVEL:debug}

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
