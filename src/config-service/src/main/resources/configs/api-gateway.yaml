spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: identity-auth-route
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/api/auth/**
            - id: identity-route
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/identity/**
              filters:
                - StripPrefix=1
            - id: flashcard-service
              uri: lb://FLASHCARD-SERVICE
              predicates:
                - Path=/api/flashcards/**,/api/flashcards
            - id: profile-route
              uri: lb://PROFILE-SERVICE
              predicates:
                - Path=/api/profiles/**,/api/profiles
            - id: wallet-route
              uri: lb://WALLET-SERVICE
              predicates:
                - Path=/api/wallet/**,/api/wallet
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
          route-definition-locator:
            enabled: true

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:seika-identity-service}
  access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    register-with-eureka: true
    fetch-registry: true

app:
  api:
    public-endpoints:
      - /api/auth/login
      - /api/auth/register
      - /api/auth/refresh
      - /api/auth/jwt-validate
      - /health
      - /actuator/**

logging:
  level:
    root: INFO
    com.seika.api_gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.server: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info,gateway,env,configprops"
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
