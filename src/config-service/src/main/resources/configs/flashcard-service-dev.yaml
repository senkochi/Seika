server:
  port: ${FLASHCARD_SERVER_PORT}

spring:
  application:
    name: flashcard-service
  data:
    mongodb:
      uri: ${FLASHCARD_DB_URI}
      socket-timeout-ms: 30000
      connection-timeout-ms: 30000
  cloud:
    openfeign:
      client:
        config:
          wallet-service:
            url: ${WALLET_SERVER_URL}
          default:
            connect-timeout: 10000
            read-timeout: 10000
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

jwt:
  issuer: seika-flashcard-service
  secret: ${JWT_SECRET}
  access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
  refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS}

logging:
  level:
    org.springframework.data.mongodb: DEBUG
    org.mongodb.driver: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    com.seika.flashcard_service: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
