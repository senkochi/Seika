server:
  port: ${REWARD_SERVER_PORT:8088}

spring:
  application:
    name: reward-service

  datasource:
    url: ${REWARD_DB_URL}
    username: ${REWARD_DB_USERNAME}
    password: ${REWARD_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: ${DB_CONNECTION_TIMEOUT:45000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT:5000}
      leak-detection-threshold: ${DB_LEAK_DETECTION:2000}
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        default_schema: ${REWARD_DB_SCHEMA:public}
        format_sql: true
        temp:
          use_jdbc_metadata_defaults: false

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

jwt:
  issuer: seika-identity-service
  secret: ${JWT_SECRET}
  access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
  refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS}

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    register-with-eureka: true
    fetch-registry: true

reward:
  flashcard:
    coins: 20
    exp: 10
    cooldown-days: 1
  quiz:
    easy:
      coins: 50
      exp: 20
    medium:
      coins: 80
      exp: 40
    hard:
      coins: 120
      exp: 60

management:
  metrics:
    tags:
      application: ${spring.application.name}
      namespace: default
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,trace"
  endpoint:
    health:
      show-details: always
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: "http://tempo:4318/v1/traces"
          transport: http
  tracing:
    enabled: true
    sampling:
      probability: 1.0
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
