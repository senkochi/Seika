spring:
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:seika_redis_secret}
      timeout: 5000ms
  application:
    name: identity-service
  datasource:
    url: ${IDENTITY_DB_URL}
    username: ${IDENTITY_DB_USERNAME}
    password: ${IDENTITY_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

eureka:
  instance:
    prefer-ip-address: true
  client:
    enabled: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    register-with-eureka: true
    fetch-registry: true

jwt:
  issuer: seika-identity-service
  secret: ${JWT_SECRET}
  access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
  refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS}

app:
  services:
    profile: ${PROFILE_SERVER_URL}
    wallet: ${WALLET_SERVER_URL}
    marketplace: ${MARKETPLACE_SERVER_URL}

messaging:
  events:
    identity-exchange: ${IDENTITY_EVENTS_EXCHANGE:identity.events}
    user-registered-routing-key: ${USER_REGISTERED_ROUTING_KEY:user.registered}

management:
  metrics:
    tags:
      application: ${spring.application.name}
      namespace: default
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,trace"
  endpoint:
    health:
      show-details: always
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: "http://tempo:4318/v1/traces"
          transport: http
  tracing:
    enabled: true
    sampling:
      probability: 1.0
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
